name: Publish Docker Images

on:
  # Trigger on release
  release:
    types: [published]
  # Manual trigger
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated, or "all")'
        required: false
        default: 'all'
      tag:
        description: 'Tag for the images (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bunsen-dev/bunsen

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC token for actions/attest-build-provenance

    strategy:
      matrix:
        image: [headless, visual, desktop]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if image should be built
        id: check
        run: |
          IMAGES="${{ github.event.inputs.images || 'all' }}"
          if [[ "$IMAGES" == "all" ]] || [[ ",$IMAGES," == *",${{ matrix.image }},"* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: steps.check.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            # For releases, use the version tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # For manual triggers, use the input tag
            type=raw,value=${{ github.event.inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # Always tag latest for releases
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        if: steps.check.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: steps.check.outputs.should_build == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
