$schema: https://schemas.bunsen.dev/agent.v1.json
version: v1
name: claude-sdk-agent
description: |
  A coding agent powered by the Claude Agent SDK.
  Uses Claude Code's built-in tools for file operations, bash commands, and code search.

  Capabilities:
  - Read, Edit, Write files
  - Run bash commands (tests, builds, etc.)
  - Search code with Glob and Grep

  This agent leverages Claude Code's agentic loop for autonomous task completion.

install:
  source:
    type: local

  # The SDK agent is a Node program (`node /agent/dist/index.js`). Asymmetric
  # composition: the agent ships its own Node so it doesn't depend on the
  # substrate happening to provide one. The official Linux Node tarball is
  # glibc-linked and self-contained except for libc — that's `closure` linkage.
  deps:
    - name: node
      version: "20.18.1"
      description: Official Node.js binary distribution (glibc closure)
      image: debian:bookworm-slim
      linkage: closure
      abi:
        libc: glibc
        libc_version: ">=2.28"
      provides:
        binaries: [node, npm, npx, corepack]
      install:
        - target: linux/amd64
          run:
            - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates xz-utils
            - curl -fsSL https://nodejs.org/dist/v20.18.1/node-v20.18.1-linux-x64.tar.xz -o /tmp/node.tar.xz
            - mkdir -p /tmp/node-extract && tar -xJf /tmp/node.tar.xz -C /tmp/node-extract --strip-components=1
            - mkdir -p /output/bin /output/lib /output/include /output/share
            - cp -a /tmp/node-extract/bin/. /output/bin/
            - cp -a /tmp/node-extract/lib/. /output/lib/
            - cp -a /tmp/node-extract/include/. /output/include/
            - cp -a /tmp/node-extract/share/. /output/share/
        - target: linux/arm64
          run:
            - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates xz-utils
            - curl -fsSL https://nodejs.org/dist/v20.18.1/node-v20.18.1-linux-arm64.tar.xz -o /tmp/node.tar.xz
            - mkdir -p /tmp/node-extract && tar -xJf /tmp/node.tar.xz -C /tmp/node-extract --strip-components=1
            - mkdir -p /output/bin /output/lib /output/include /output/share
            - cp -a /tmp/node-extract/bin/. /output/bin/
            - cp -a /tmp/node-extract/lib/. /output/lib/
            - cp -a /tmp/node-extract/include/. /output/include/
            - cp -a /tmp/node-extract/share/. /output/share/

  build:
    # Pin Claude Code to a specific version for reproducibility across runs
    # (match the claude-code agent). Bump this deliberately for a newer CLI.
    image: ubuntu:22.04
    cacheSalt: claude-code-2.1.142
    run:
      - |
        if ! command -v curl >/dev/null 2>&1; then
          apt-get update && apt-get install -y curl
        fi
        curl -fsSL https://claude.ai/install.sh | bash -s 2.1.142
        mkdir -p /output/bin
        cp "$HOME/.local/bin/claude" /output/bin/claude
        chmod +x /output/bin/claude
  configure:
    - run: |
        # Claude Code's KillShell tool shells out to `ps` to find child processes.
        # Without it, KillShell crashes the entire process (exit code 1).
        # Many TB experiments don't declare procps in requires.packages.apt
        # (and the bunsen/headless base image is too minimal to include it
        # by default), so we install it here as part of agent configure
        # rather than refusing to run.
        if ! command -v ps >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq procps
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache procps
          fi
          command -v ps >/dev/null 2>&1 || { echo "Failed to install procps (no supported package manager)" >&2; exit 1; }
        fi

entrypoint:
  command: node /agent/dist/index.js

interaction:
  mode: direct

# The agent reads its model from CLAUDE_MODEL (src/agent.ts). `bn run <exp>
# claude-sdk-agent --model <id>` sets it at CLI precedence; with no flag,
# `default` is used. Pinning a default here also fixes the SDK otherwise
# falling back to its bundled model.
model:
  env: CLAUDE_MODEL
  default: claude-sonnet-4-6

defaults:
  env:
    # Turn cap applies to every model; kept here so it isn't tied to a variant.
    CLAUDE_MAX_TURNS: "500"

examples:
  - prompt: Fix the bug in main.py and run tests
    invocation: node /agent/dist/index.js "Fix the bug in main.py and run tests"

# Behavioral overlays only — pick the model with `--model`
# (e.g. `claude-sdk-agent --model claude-opus-4-8`).
variants:
  read-only:
    description: Read-only mode for analysis tasks
    entrypoint:
      args:
        - --read-only

  # NOTE: disable-background-tasks is NOT supported for the SDK agent.
  # The SDK bundles its own stripped-down cli.js that does not contain the
  # CLAUDE_CODE_DISABLE_BACKGROUND_TASKS code path. When query() completes,
  # the SDK sends SIGTERM to the CLI subprocess, killing all child processes
  # (including background servers). This is an upstream limitation.
  # For service tasks, use the claude-code agent with :disable-background-tasks instead.
