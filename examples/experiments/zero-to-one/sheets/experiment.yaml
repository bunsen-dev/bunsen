        - h-error-poison
        - h-nomatch-recalc
      aggregate:
        function: all

    - id: dates-correct
      title: Dates correct (Group F)
      type: aggregate
      weight: 0
      needs: [f-date-construct-display, f-date-overflow-normalization, f-leap-year-weekday, f-date-arithmetic-types, f-edate-eomonth-clamp, f-datedif-units, f-date-lattice-interplay]
      aggregate: { function: all }

    - id: lookups-correct
      title: Lookups correct (Group G)
      type: aggregate
      weight: 0
      needs: [g-vlookup-exact, g-vlookup-approx-default, g-match-position-types, g-index-rc, g-index-match-combo, g-lookup-colindex-ref, g-na-token-lattice]
      aggregate: { function: all }

    - id: conditional-aggregates-correct
      title: Conditional aggregates correct (Group H)
      type: aggregate
      weight: 0
      needs: [h-numeric-boundary, h-notequal-empty, h-offset-sumrange, h-numeric-excludes-nonnumber, h-text-exact-no-wildcard, h-error-poison, h-nomatch-recalc]
      aggregate: { function: all }

  report:
    needs: all
    instructions: |
      Group the results: baseline (can it build a spreadsheet at all) vs the hard groups
      A (operator precedence), B (lazy IF), C (typed errors), D (display/rounding), E
      (dependency-graph/perf). Call out the `engine-quality` strict aggregate as the
      headline "did the agent build a REAL engine?" signal, and specifically whether
      e-exp-hang passed (a naive recompute-every-reference engine does exponential work and
      times out, scoring 0 there).
      For each failure, cite the verifier's expected-vs-actual. Distinguish a contract
      misread (wrong data-testid / missing start.sh / a new function not registered ->
      #NAME?) from a real engine defect (e.g. eager IF evaluation leaking #DIV/0!, or
      unmemoized recursion hanging E1). Also group the new axes: F (dates), G (lookups),
      H (conditional aggregates), with per-axis pass/fail from the `dates-correct`,
      `lookups-correct`, `conditional-aggregates-correct` aggregates. Headline F/G/H
      tells: WEEKDAY off-by-one (getUTCDay), EDATE roll-forward instead of clamp, DATEDIF
      anniversary boundary, VLOOKUP approximate default, `#N/A` not integrated as a real
      token, COUNTIF counting TRUE-as-1 or an empty cell, and an error cell silently
      skipped instead of poisoning an aggregate.
